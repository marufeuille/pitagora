<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>ピタゴラスイッチ</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap');

      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #b89860;
        overflow: hidden;
        font-family: 'Caveat', 'Comic Sans MS', cursive;
        user-select: none;
        -webkit-user-select: none;
      }

      /* ── Control Bar (top) ── */
      #control-bar {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 52px;
        background: #faf7f0;
        border-bottom: 2.5px solid #c8b898;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 14px;
        z-index: 100;
      }
      #control-bar .title {
        color: #3a2e20;
        font-size: 20px;
        font-weight: 700;
        margin-right: 12px;
        letter-spacing: 0.02em;
      }
      #control-bar button {
        height: 34px;
        padding: 0 13px;
        border-radius: 6px;
        font-family: inherit;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: filter 0.12s, transform 0.1s;
        display: flex;
        align-items: center;
        gap: 5px;
        border: 2px solid transparent;
      }
      #btn-play   { background: #d4edda; color: #2a6e3c; border-color: #88c4a0; }
      #btn-pause  { background: #fce8c8; color: #7a4a10; border-color: #d4a860; display: none; }
      #btn-reset  { background: #d6e8f8; color: #2a4e78; border-color: #88b0d8; }
      #btn-clear  { background: #fad8d4; color: #7a2a20; border-color: #d49090; }
      #btn-preset      { background: #d4eee8; color: #2a5e50; border-color: #88c0b0; }
      #btn-exit-level  { background: #fce8c8; color: #7a4a10; border-color: #d4a860; }
      .hidden          { display: none !important; }
      #btn-save    { background: #e8d8f4; color: #4a2a6e; border-color: #b898d8; }
      #btn-levels  { background: #fce8c8; color: #7a4a10; border-color: #d4a860; }
      #btn-bgm     { background: #f0ece0; color: #3a2e20; border-color: #c8b898; }
      #btn-bgm.on  { background: #d4edda; color: #2a6e3c; border-color: #88c4a0; }
      #btn-se      { background: #f0ece0; color: #3a2e20; border-color: #c8b898; }
      #btn-se.on   { background: #d4edda; color: #2a6e3c; border-color: #88c4a0; }

      #control-bar button:hover { filter: brightness(0.93); }
      #control-bar button:active { transform: scale(0.95); }
      #mode-badge {
        margin-left: auto;
        padding: 4px 12px;
        border-radius: 14px;
        font-family: inherit;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.05em;
        background: #d4edda;
        color: #2a6e3c;
        border: 2px solid #88c4a0;
      }
      #mode-badge.playing { background: #fad8d4; color: #7a2a20; border-color: #d49090; }
      #mode-badge.paused  { background: #fce8c8; color: #7a4a10; border-color: #d4a860; }

      /* ── Toolbar (left) ── */
      #toolbar {
        position: fixed;
        left: 0; top: 52px; bottom: 0;
        width: 96px;
        background: #f5f0e5;
        border-right: 2.5px solid #c8b898;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 10px 6px;
        z-index: 100;
        overflow-y: auto;
      }
      #toolbar .section-label {
        color: #9a8a78;
        font-family: inherit;
        font-size: 11px;
        letter-spacing: 0.05em;
        align-self: stretch;
        text-align: center;
        padding: 4px 0;
      }
      #toolbar .divider {
        width: 60%;
        height: 1.5px;
        background: #d0c4b0;
        margin: 3px 0;
      }
      .tool-btn {
        width: 76px;
        height: 60px;
        border: 2px solid #c8b898;
        border-radius: 8px;
        background: #faf7f0;
        color: #3a2e20;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        font-family: inherit;
        font-size: 12px;
        font-weight: 600;
        transition: all 0.12s;
      }
      .tool-btn .icon { font-size: 22px; line-height: 1; }
      .tool-btn:hover { background: #ede5d5; border-color: #a89878; }
      .tool-btn.active {
        background: #e8dcc8;
        border-color: #8a6a30;
        color: #3a2010;
        box-shadow: inset 0 1px 4px rgba(0,0,0,0.12);
      }
      .tool-btn:disabled { opacity: 0.4; cursor: default; }

      /* ── Game Canvas Container ── */
      #game-canvas {
        position: fixed;
        left: 96px; top: 52px;
        right: 0; bottom: 0;
      }
      #game-canvas canvas { display: block; }

      /* ── Save/Load Modal ── */
      #save-modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(180,160,130,0.5);
        z-index: 200;
        justify-content: center;
        align-items: center;
      }
      #save-modal-overlay.visible { display: flex; }
      #save-modal {
        background: #faf7f0;
        border: 2.5px solid #c8b898;
        border-radius: 12px;
        padding: 24px;
        width: 340px;
        max-height: 480px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        box-shadow: 4px 4px 0 #d0c4b0;
      }
      #save-modal h2 { color: #3a2e20; font-size: 20px; font-family: inherit; }
      #save-modal input {
        background: #fff;
        border: 2px solid #c8b898;
        border-radius: 6px;
        color: #3a2e20;
        padding: 7px 10px;
        font-family: inherit;
        font-size: 15px;
        width: 100%;
      }
      #save-modal .slot-list {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: 220px;
      }
      #save-modal .slot-item {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #f0ece0;
        border: 1.5px solid #c8b898;
        border-radius: 6px;
        padding: 7px 10px;
      }
      #save-modal .slot-item .slot-name { flex: 1; color: #3a2e20; font-family: inherit; font-size: 14px; }
      #save-modal .slot-item .slot-date { color: #9a8a78; font-size: 11px; }
      #save-modal .slot-item button {
        padding: 3px 9px;
        border-radius: 5px;
        border: 1.5px solid;
        cursor: pointer;
        font-family: inherit;
        font-size: 12px;
        font-weight: 600;
      }
      #save-modal .btn-load { background: #d6e8f8; color: #2a4e78; border-color: #88b0d8; }
      #save-modal .btn-del  { background: #fad8d4; color: #7a2a20; border-color: #d49090; }
      #save-modal .modal-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
      #save-modal .modal-actions button {
        padding: 7px 13px;
        border-radius: 6px;
        border: 2px solid;
        cursor: pointer;
        font-family: inherit;
        font-size: 14px;
        font-weight: 600;
      }
      .btn-primary   { background: #e8d8f4; color: #4a2a6e; border-color: #b898d8; }
      .btn-secondary { background: #ede5d5; color: #3a2e20; border-color: #c8b898; }
      .btn-export    { background: #d4edda; color: #2a6e3c; border-color: #88c4a0; }

      /* ── Context Menu ── */
      #context-menu {
        display: none;
        position: fixed;
        z-index: 150;
        background: #faf7f0;
        border: 2px solid #c8b898;
        border-radius: 8px;
        padding: 6px 0;
        min-width: 145px;
        box-shadow: 3px 3px 0 #d0c4b0;
      }
      #context-menu.visible { display: block; }
      #context-menu button {
        width: 100%;
        padding: 7px 14px;
        background: none;
        border: none;
        color: #3a2e20;
        font-family: inherit;
        font-size: 14px;
        text-align: left;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #context-menu button:hover { background: #ede5d5; }
      #context-menu .separator { height: 1.5px; background: #d0c4b0; margin: 4px 0; }


      /* ── Clear overlay ── */
      #clear-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 300;
        justify-content: center;
        align-items: center;
        pointer-events: none;
      }
      #clear-overlay.visible { display: flex; pointer-events: auto; }
      #clear-card {
        background: #faf7f0;
        border: 3px solid #c8b898;
        border-radius: 16px;
        padding: 36px 52px;
        text-align: center;
        box-shadow: 6px 6px 0 #d0c4b0;
        animation: pop-in 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes pop-in {
        from { transform: scale(0.5); opacity: 0; }
        to   { transform: scale(1);   opacity: 1; }
      }
      #clear-card .clear-title {
        font-family: 'Caveat', cursive;
        font-size: 52px;
        font-weight: 700;
        color: #3a2e20;
        line-height: 1.1;
      }
      #clear-card .clear-stars {
        font-size: 36px;
        margin: 8px 0;
        letter-spacing: 6px;
      }
      #clear-card .clear-sub {
        font-family: 'Caveat', cursive;
        font-size: 18px;
        color: #9a8a78;
        margin-bottom: 20px;
      }
      #clear-card button {
        font-family: 'Caveat', cursive;
        font-size: 18px;
        font-weight: 700;
        padding: 10px 28px;
        border-radius: 8px;
        border: 2px solid #88b0d8;
        background: #d6e8f8;
        color: #2a4e78;
        cursor: pointer;
      }
      #clear-card button:hover { filter: brightness(0.93); }

      /* ── Constraint badge on tool buttons ── */
      .tool-btn { position: relative; }
      .constraint-badge {
        position: absolute;
        bottom: 3px;
        right: 5px;
        font-size: 11px;
        font-weight: 700;
        font-family: inherit;
        line-height: 1;
      }

      /* ── Level select modal ── */
      #level-modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(180,160,130,0.5);
        z-index: 200;
        justify-content: center;
        align-items: center;
      }
      #level-modal-overlay.visible { display: flex; }
      #level-modal {
        background: #faf7f0;
        border: 2.5px solid #c8b898;
        border-radius: 12px;
        padding: 24px;
        width: 520px;
        max-height: 560px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        box-shadow: 4px 4px 0 #d0c4b0;
        overflow-y: auto;
      }
      #level-modal h2 { color: #3a2e20; font-size: 20px; font-family: inherit; }
      .level-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .level-card {
        background: #f0ece0;
        border: 2px solid #c8b898;
        border-radius: 8px;
        padding: 12px;
        cursor: pointer;
        transition: all 0.12s;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .level-card:hover { background: #e8dcc8; border-color: #a89878; }
      .level-card .lc-title { font-size: 15px; font-weight: 700; color: #3a2e20; font-family: inherit; }
      .level-card .lc-desc  { font-size: 11px; color: #7a6a58; font-family: inherit; }
      .level-card .lc-diff  { font-size: 13px; }
      .level-card .lc-stars { font-size: 14px; letter-spacing: 1px; }
      .level-modal-footer {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }

      /* ── Tip ── */
      #tip {
        position: fixed;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(60,50,35,0.38);
        font-family: inherit;
        font-size: 12px;
        pointer-events: none;
        z-index: 50;
      }

      /* ── Gravity control (free play only) ── */
      #gravity-control {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 0 10px;
        height: 34px;
        border: 2px solid #c8b898;
        border-radius: 6px;
        background: #f0ece0;
        color: #3a2e20;
        font-family: inherit;
        font-weight: 600;
        font-size: 13px;
      }
      #gravity-control.hidden { display: none; }
      #gravity-slider {
        width: 80px;
        accent-color: #8a6a30;
        cursor: pointer;
      }
      #gravity-label {
        min-width: 32px;
        font-size: 13px;
        font-weight: 700;
        font-family: inherit;
        color: #3a2010;
      }

      /* ── Level mode indicator ── */
      #level-indicator {
        display: none;
        background: #d4eee8;
        color: #2a5e50;
        border: 2px solid #88c0b0;
        border-radius: 6px;
        padding: 4px 10px;
        font-family: inherit;
        font-size: 13px;
        font-weight: 600;
      }
      #level-indicator.visible { display: inline-flex; align-items: center; gap: 6px; }
    </style>
  </head>
  <body>
    <!-- Control Bar -->
    <div id="control-bar">
      <span class="title">✏ ピタゴラスイッチ</span>
      <button id="btn-play">▶ <span data-en="Play">さいせい</span></button>
      <button id="btn-pause">⏸ <span data-en="Pause">とめる</span></button>
      <button id="btn-reset">↩ <span data-en="Reset">はじめから</span></button>
      <button id="btn-clear">🗑 <span data-en="Clear">けす</span></button>
      <button id="btn-levels">🎯 <span data-en="Levels">れべる</span></button>
      <button id="btn-exit-level" class="hidden">← <span data-en="Free Play">フリーあそび</span></button>
      <button id="btn-preset">★ <span data-en="Preset">プリセット</span></button>
      <button id="btn-save">💾 <span data-en="Save/Load">ほぞん</span></button>
      <button id="btn-bgm" title="BGM切り替え">♪ <span data-en="BGM">おんがく</span></button>
      <button id="btn-se" title="効果音切り替え">🔊 <span data-en="SE">こうかおん</span></button>
      <span id="gravity-control" title="重力の強さを変更（フリープレイのみ）">
        🌍 <span data-en="Gravity">じゅうりょく</span>
        <input type="range" id="gravity-slider" min="0.25" max="4" step="0.25" value="1">
        <span id="gravity-label">×1</span>
      </span>
      <span id="level-indicator"></span>
      <span id="mode-badge">EDIT</span>
    </div>

    <!-- Toolbar -->
    <div id="toolbar">
      <span class="section-label" data-en="Tool">ツール</span>
      <button class="tool-btn cursor-tool active" data-tool="cursor" title="選択・移動">
        <span class="icon">↖</span>
        <span data-en="Cursor">えらぶ</span>
      </button>
      <div class="divider"></div>
      <span class="section-label" data-en="Parts">パーツ</span>
      <button class="tool-btn" data-tool="ball" title="ボール">
        <span class="icon">🔵</span>
        <span data-en="Ball">ボール</span>
      </button>
      <button class="tool-btn" data-tool="ramp" title="斜面">
        <span class="icon">╱</span>
        <span data-en="Ramp">ナナメ</span>
      </button>
      <button class="tool-btn" data-tool="platform" title="板">
        <span class="icon">─</span>
        <span data-en="Platform">いた</span>
      </button>
      <button class="tool-btn" data-tool="domino" title="ドミノ">
        <span class="icon">▌</span>
        <span data-en="Domino">ドミノ</span>
      </button>
      <button class="tool-btn" data-tool="seesaw" title="シーソー">
        <span class="icon">⚖</span>
        <span data-en="Seesaw">シーソー</span>
      </button>
      <button class="tool-btn" data-tool="spring" title="バネ">
        <span class="icon">🌀</span>
        <span data-en="Spring">バネ</span>
      </button>
      <button class="tool-btn" data-tool="bell" title="ベル">
        <span class="icon">🔔</span>
        <span data-en="Bell">ベル</span>
      </button>
      <button class="tool-btn" data-tool="goal" title="ゴール">
        <span class="icon">⭐</span>
        <span data-en="Goal">ゴール</span>
      </button>
      <div class="divider"></div>
      <span class="section-label" data-en="Actions">そうさ</span>
      <button class="tool-btn" id="btn-rotate-part" title="右回転 15°">
        <span class="icon">↻</span>
        <span data-en="Rotate">まわす</span>
      </button>
      <button class="tool-btn" id="btn-delete-part" title="削除">
        <span class="icon">🗑</span>
        <span data-en="Delete">けす</span>
      </button>
      <button class="tool-btn" id="btn-undo" title="元に戻す (Ctrl+Z)" disabled>
        <span class="icon">↩</span>
        <span data-en="Undo">もどす</span>
      </button>
      <button class="tool-btn" id="btn-redo" title="やり直す (Ctrl+Shift+Z)" disabled>
        <span class="icon">↪</span>
        <span data-en="Redo">すすむ</span>
      </button>
    </div>

    <!-- Game Canvas -->
    <div id="game-canvas"></div>

    <!-- Context Menu -->
    <div id="context-menu">
      <button id="ctx-rotate-cw">↻ <span data-en="Rotate CW">じどけいまわり</span></button>
      <button id="ctx-rotate-ccw">↺ <span data-en="Rotate CCW">はんじどけいまわり</span></button>
      <div class="separator"></div>
      <button id="ctx-duplicate">⧉ <span data-en="Duplicate">コピー</span></button>
      <button id="ctx-delete">🗑 <span data-en="Delete">けす</span></button>
    </div>

    <!-- Save Modal -->
    <div id="save-modal-overlay">
      <div id="save-modal">
        <h2>💾 <span data-en="Save / Load">ほぞん・よみこみ</span></h2>
        <div style="display:flex; gap:8px;">
          <input id="save-name-input" type="text" placeholder="セーブ名を入力..." maxlength="30" />
          <button class="btn-primary" id="btn-do-save" style="padding:8px 12px; border-radius:6px; border:none; cursor:pointer; font-weight:700;"><span data-en="Save">ほぞん</span></button>
        </div>
        <div class="slot-list" id="slot-list"></div>
        <div class="modal-actions">
          <button class="btn-export" id="btn-export-json">↑ <span data-en="Export">エクスポート</span></button>
          <label class="btn-export" style="padding:8px 14px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; background:#27ae60; color:#fff;">
            ↓ <span data-en="Import">インポート</span>
            <input type="file" id="import-file-input" accept=".json" style="display:none;" />
          </label>
          <button class="btn-secondary" id="btn-close-modal"><span data-en="Close">とじる</span></button>
        </div>
      </div>
    </div>

    <!-- Clear overlay -->
    <div id="clear-overlay">
      <div id="clear-card">
        <div class="clear-title">🎉 クリア！</div>
        <div class="clear-stars" id="clear-stars-display">⭐⭐⭐</div>
        <div class="clear-sub" id="clear-sub-text">ボールがゴールに入った！</div>
        <div style="display:flex; gap:10px; justify-content:center;">
          <button id="btn-clear-reset"><span data-en="Try Again">もういちど</span></button>
          <button id="btn-next-level" style="display:none; background:#d4edda; color:#2a6e3c; border-color:#88c4a0;"><span data-en="Next Level →">つぎのれべる →</span></button>
        </div>
      </div>
    </div>

    <!-- Level select modal -->
    <div id="level-modal-overlay">
      <div id="level-modal">
        <h2>🎯 <span data-en="Select Level">れべるせんたく</span></h2>
        <div class="level-grid" id="level-grid"></div>
        <div class="level-modal-footer">
          <button class="btn-secondary" id="btn-close-level-modal"><span data-en="Close">とじる</span></button>
        </div>
      </div>
    </div>

    <div id="tip">右クリック/2本指ドラッグ: カメラ移動　ホイール/ピンチ: ズーム　Delete: 削除　Ctrl+Z: 元に戻す</div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
